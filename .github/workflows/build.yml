name: Compilar EasyPresenter Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Compilar para ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: Linux (Ubuntu)
            os: ubuntu-22.04
            rust_version: stable
            artifact_name: EasyPresenter-Linux.deb
            is_linux: true
            is_windows: false
            is_win7: false

          - target_name: Windows 10-11
            os: windows-latest
            rust_version: stable
            artifact_name: EasyPresenter-Win10-11.exe
            is_linux: false
            is_windows: true
            is_win7: false

          - target_name: Windows 7
            os: windows-latest
            rust_version: "1.77.2"
            artifact_name: EasyPresenter-Win7.exe
            is_linux: false
            is_windows: true
            is_win7: true

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Rust (${{ matrix.rust_version }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_version }}

      # ── LINUX ──────────────────────────────────────────────────────────────
      - name: Instalar Dependencias (Linux)
        if: matrix.is_linux
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libfontconfig1-dev \
            libasound2-dev libsqlite3-dev libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      # ── WINDOWS: INSTALAR GSTREAMER ────────────────────────────────────────
      #
      # LECCIONES APRENDIDAS:
      #   - 1.22.10 ya no existe en freedesktop.org → 404
      #   - La versión actual disponible es 1.26.x
      #   - Sin pin de versión, choco instala la última disponible sin errores
      #   - La ruta de instalación es "C:\Program Files\gstreamer\..." (no C:\gstreamer)
      #
      # ESTRATEGIA: instalar sin pin de versión y detectar la ruta dinámicamente.
      # ──────────────────────────────────────────────────────────────────────
      - name: Instalar GStreamer vía Chocolatey (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          # Sin --version: choco instala la última versión disponible (1.26.x)
          # gstreamer-devel tiene como dependencia gstreamer, así que instala ambos
          choco install gstreamer-devel -y --no-progress

          # Detectar la ruta real de instalación (puede variar según la versión de choco)
          $possiblePaths = @(
            "C:\Program Files\gstreamer\1.0\msvc_x86_64",
            "C:\gstreamer\1.0\msvc_x86_64",
            "$env:GSTREAMER_1_0_ROOT_MSVC_X86_64"
          )

          $GstPath = $null
          foreach ($p in $possiblePaths) {
            if ($p -and (Test-Path "$p\bin\gst-launch-1.0.exe")) {
              $GstPath = $p
              break
            }
          }

          # Si todavía no lo encontramos, buscar recursivamente
          if (-not $GstPath) {
            $found = Get-ChildItem "C:\Program Files" -Recurse -Filter "gst-launch-1.0.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $GstPath = $found.DirectoryName -replace "\\bin$", "" }
          }
          if (-not $GstPath) {
            $found = Get-ChildItem "C:\" -Recurse -Filter "gst-launch-1.0.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $GstPath = $found.DirectoryName -replace "\\bin$", "" }
          }

          if (-not $GstPath) {
            Write-Error "❌ No se pudo localizar GStreamer tras la instalación"
            exit 1
          }

          Write-Host "✅ GStreamer encontrado en: $GstPath"

          # Exportar la ruta para los pasos siguientes
          echo "GSTREAMER_ROOT=$GstPath" >> $env:GITHUB_ENV

      - name: Configurar Entorno GStreamer (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          $GstPath = $env:GSTREAMER_ROOT

          # pkgconfiglite: binario estático, no necesita DLLs de GStreamer para correr
          choco install pkgconfiglite -y --no-progress

          echo "PKG_CONFIG_PATH=$GstPath\lib\pkgconfig"  >> $env:GITHUB_ENV
          echo "GSTREAMER_1_0_ROOT_X86_64=$GstPath"      >> $env:GITHUB_ENV
          echo "$GstPath\bin"                             >> $env:GITHUB_PATH

          # Verificar que pkg-config encuentra glib (si falla aquí el build fallará)
          $env:PKG_CONFIG_PATH = "$GstPath\lib\pkgconfig"
          $ver = pkg-config --modversion glib-2.0
          Write-Host "✅ glib-2.0 version: $ver"

      - name: Obtener runtime MSI para Inno Setup (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          # Buscar el MSI del runtime en el caché de Chocolatey
          $cached = Get-ChildItem "C:\ProgramData\chocolatey\lib\gstreamer\tools\" -Filter "*runtime*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1

          if (-not $cached) {
            # Buscar en la carpeta temporal de choco
            $cached = Get-ChildItem "$env:TEMP" -Filter "gstreamer-1.0-msvc*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          }

          if ($cached) {
            Write-Host "✅ MSI encontrado en caché: $($cached.FullName)"
            Copy-Item $cached.FullName "gstreamer-runtime.msi"
          } else {
            # El runtime ya está instalado por choco como dependencia de devel.
            # Buscamos el MSI que choco descargó en su directorio de trabajo.
            $msiSearch = Get-ChildItem "C:\ProgramData\chocolatey" -Recurse -Filter "*gstreamer*msvc*.msi" -ErrorAction SilentlyContinue |
                         Where-Object { $_.Name -notmatch "devel" } |
                         Select-Object -First 1

            if ($msiSearch) {
              Write-Host "✅ MSI encontrado: $($msiSearch.FullName)"
              Copy-Item $msiSearch.FullName "gstreamer-runtime.msi"
            } else {
              # Último recurso: re-descargar usando la versión que choco instaló
              $installedVer = choco list gstreamer --local-only | Select-String "gstreamer \d" | ForEach-Object { ($_ -split " ")[1] }
              Write-Host "Versión instalada de GStreamer: $installedVer"
              $MsiUrl = "https://gstreamer.freedesktop.org/data/pkg/windows/$installedVer/msvc/gstreamer-1.0-msvc-x86_64-$installedVer.msi"
              Write-Host "Descargando desde: $MsiUrl"
              $ProgressPreference = 'SilentlyContinue'
              Invoke-WebRequest -Uri $MsiUrl -OutFile "gstreamer-runtime.msi" -UseBasicParsing
            }
          }

          $size = (Get-Item "gstreamer-runtime.msi" -ErrorAction SilentlyContinue).Length
          if ($size -gt 1MB) {
            Write-Host "✅ gstreamer-runtime.msi listo ($([math]::Round($size/1MB,1)) MB)"
          } else {
            Write-Warning "⚠️ gstreamer-runtime.msi es muy pequeño ($size bytes), puede estar corrupto"
          }

      # ── PREPARACIÓN WIN 7 ──────────────────────────────────────────────────
      - name: Adaptar Cargo.toml para Win 7 (versiones compatibles con Rust 1.77)
        if: matrix.is_win7
        shell: bash
        run: |
          sed -i 's/slint = "1\.8\.0"/slint = "=1.8.0"/'             Cargo.toml
          sed -i 's/slint-build = "1\.8\.0"/slint-build = "=1.8.0"/' Cargo.toml
          sed -i 's/image = "0\.25"/image = "=0.24.9"/'               Cargo.toml
          rm -f Cargo.lock

          echo "--- Cambios aplicados ---"
          grep -E "slint|image" Cargo.toml

      # ── COMPILACIÓN ────────────────────────────────────────────────────────
      - name: Compilar Proyecto (Release)
        run: cargo build --release

      # ── EMPAQUETADO ────────────────────────────────────────────────────────
      - name: Generar .deb (Linux)
        if: matrix.is_linux
        run: |
          cargo install cargo-deb
          cargo deb
          cp target/debian/*.deb ${{ matrix.artifact_name }}

      - name: Generar Instalador Inno Setup (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Mover Instalador (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          if (Test-Path "Output/Instalar_EasyPresenter_v1.0.exe") {
            Move-Item "Output/Instalar_EasyPresenter_v1.0.exe" "${{ matrix.artifact_name }}"
          }

      # ── ARTEFACTOS ─────────────────────────────────────────────────────────
      - name: Subir Artefacto Terminado
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}