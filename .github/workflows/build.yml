name: Compilar EasyPresenter Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1: LINUX → solo .deb
  # ══════════════════════════════════════════════════════════════════════════
  build-linux:
    name: Linux (.deb)
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar Rust (stable)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libfontconfig1-dev \
            libasound2-dev libsqlite3-dev libunwind-dev \
            libssl-dev pkg-config \
            libgtk-3-dev \
            libdbus-1-dev \
            libxrandr-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav

      - name: Preparar assets para el .deb
        run: |
          mkdir -p assets
          # Si no tienes icono propio, genera uno placeholder
          if [ ! -f assets/icon.png ]; then
            # Instalamos las fuentes dejavu para que ImageMagick tenga con qué escribir
            sudo apt-get install -y imagemagick fonts-dejavu-core
            
            # Forzamos el uso de DejaVu-Sans
            convert -size 256x256 "xc:#0ea5e9" -font DejaVu-Sans -fill white -pointsize 48 \
              -gravity center -annotate 0 "EP" assets/icon.png
          fi
      - name: Compilar (Release)
        run: cargo build --release

      - name: Verificar libpdfium.so disponible para el .deb
        run: |
            ls -la libpdfium.so  # confirma que existe en el repo
            cp libpdfium.so target/release/  # copia al lado del binario también (fallback dev)

      - name: Instalar cargo-deb
        run: cargo install cargo-deb

      - name: Generar .deb
        run: |
          # Guardamos el tag (ej: v1.1.4) en una variable
          TAG_NAME="${{ github.ref_name }}"
          
          # Le recortamos la "v" del principio (queda: 1.1.4)
          CLEAN_VERSION="${TAG_NAME#v}"
          
          # Pasamos la versión limpia a cargo deb
          cargo deb --deb-version "$CLEAN_VERSION"
          cp target/debian/*.deb EasyPresenter-Linux.deb

      - name: Subir .deb como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: EasyPresenter-Linux.deb
          path: EasyPresenter-Linux.deb

      - name: Publicar en GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: EasyPresenter-Linux.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2: WINDOWS → instalador .exe con Inno Setup
  # ══════════════════════════════════════════════════════════════════════════
  build-windows:
    name: Windows (.exe installer)
    runs-on: windows-latest

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar Rust (stable)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Instalar GStreamer (Directo y a prueba de fallos)
        shell: pwsh
        run: |
          $Version = "1.24.2"
          $UrlGst = "https://gstreamer.freedesktop.org/data/pkg/windows/$Version/msvc/gstreamer-1.0-msvc-x86_64-$Version.msi"
          $UrlDev = "https://gstreamer.freedesktop.org/data/pkg/windows/$Version/msvc/gstreamer-1.0-devel-msvc-x86_64-$Version.msi"

          Write-Host "1. Descargando GStreamer usando curl nativo..."
          # Usamos curl puro. Sin fingir ser Chrome, el firewall no nos pedirá resolver JavaScript.
          curl.exe -s -L -o gst.msi $UrlGst

          # Comprobamos el tamaño del archivo para asegurar que bajó el MSI real y no una página de bloqueo HTML
          $Size = (Get-Item "gst.msi").Length
          if ($Size -lt 1000000) {
              Write-Host "El servidor principal nos bloqueó. Usando servidor de respaldo (Web Archive)..."
              $BackupUrlGst = "https://web.archive.org/web/0/if_/$UrlGst"
              $BackupUrlDev = "https://web.archive.org/web/0/if_/$UrlDev"
              
              curl.exe -s -L -o gst.msi $BackupUrlGst
              curl.exe -s -L -o gst-dev.msi $BackupUrlDev
          } else {
              Write-Host "Descarga principal exitosa. Bajando paquete de desarrollo..."
              curl.exe -s -L -o gst-dev.msi $UrlDev
          }

          Write-Host "2. Instalando paquetes MSI en silencio..."
          Start-Process -Wait -FilePath msiexec -ArgumentList "/i gst.msi /quiet /norestart"
          Start-Process -Wait -FilePath msiexec -ArgumentList "/i gst-dev.msi /quiet /norestart"

          $GstPath = "C:\gstreamer\1.0\msvc_x86_64"
          Write-Host "3. GStreamer instalado exitosamente en: $GstPath"
          echo "GSTREAMER_ROOT=$GstPath" >> $env:GITHUB_ENV

      - name: Configurar PKG_CONFIG para GStreamer
        shell: pwsh
        run: |
          $GstPath = $env:GSTREAMER_ROOT

          # Instalamos pkg-config nativo para Windows (entiende rutas C:\...)
          # pkgconfiglite NO funciona con rutas Windows — usamos el de MSYS2
          choco install msys2 -y --no-progress
          $msys2Bin = "C:\tools\msys64\usr\bin"
          echo "$msys2Bin" >> $env:GITHUB_PATH

          # PKG_CONFIG_PATH debe usar barras normales de Windows
          $PkgConfigPath = "$GstPath\lib\pkgconfig"
          echo "PKG_CONFIG_PATH=$PkgConfigPath"         >> $env:GITHUB_ENV
          echo "GSTREAMER_1_0_ROOT_X86_64=$GstPath"     >> $env:GITHUB_ENV
          echo "$GstPath\bin"                           >> $env:GITHUB_PATH

          # Verificar que los .pc existen
          Write-Host "Archivos .pc encontrados:"
          Get-ChildItem "$PkgConfigPath\glib*.pc" -ErrorAction SilentlyContinue

      - name: Forzar linking directo sin pkg-config
        shell: pwsh
        run: |
          $GstPath = $env:GSTREAMER_ROOT
          $Lib = "$GstPath\lib"
          # Estas variables hacen que glib-sys encuentre las libs directamente
          echo "GLIB_2.0_NO_PKG_CONFIG=1"              >> $env:GITHUB_ENV
          echo "GSTREAMER_1_0_NO_PKG_CONFIG=1"          >> $env:GITHUB_ENV
          echo "LIBRARY_PATH=$Lib"                      >> $env:GITHUB_ENV
          echo "RUSTFLAGS=-L $Lib"                      >> $env:GITHUB_ENV

      - name: Compilar (Release)
        run: cargo build --release

      - name: Copiar DLLs de GStreamer
        shell: pwsh
        run: |
          Copy-Item "$env:GSTREAMER_ROOT\bin\*.dll" -Destination "target\release\" -Force
          Remove-Item "target\release\*python*.dll" -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path "target\release\lib\gstreamer-1.0"
          Copy-Item "$env:GSTREAMER_ROOT\lib\gstreamer-1.0\*.dll" "target\release\lib\gstreamer-1.0\" -Force
          Remove-Item "target\release\lib\gstreamer-1.0\*python*.dll" -ErrorAction SilentlyContinue

      - name: Copiar pdfium.dll
        shell: pwsh
        run: Copy-Item "pdfium.dll" -Destination "target\release\" -Force

      - name: Generar instalador con Inno Setup
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Mover instalador al raiz
        shell: pwsh
        run: |
          $exe = Get-ChildItem "Output" -Filter "*.exe" | Select-Object -First 1
          if ($exe) {
            Move-Item $exe.FullName "EasyPresenter-Win10-11.exe"
          } else {
            Write-Error "No se encontro el .exe de Inno Setup"; exit 1
          }

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: EasyPresenter-Win10-11.exe
          path: EasyPresenter-Win10-11.exe

      - name: Publicar en GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: EasyPresenter-Win10-11.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}