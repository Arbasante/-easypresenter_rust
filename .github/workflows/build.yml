name: Compilar EasyPresenter Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1: LINUX → .deb + AppImage
  # ══════════════════════════════════════════════════════════════════════════
  build-linux:
    name: Linux (.deb + AppImage)
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar Rust (stable)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libfontconfig1-dev \
            libasound2-dev libsqlite3-dev libunwind-dev \
            libssl-dev pkg-config imagemagick libfuse2 \
            libgtk-3-dev \
            libdbus-1-dev \
            libxrandr-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav

      - name: Compilar (Release)
        run: cargo build --release

      - name: Copiar libpdfium.so al output
        run: cp libpdfium.so target/release/

      # ── .deb ─────────────────────────────────────────────────────────────
      - name: Instalar cargo-deb
        run: cargo install cargo-deb

      - name: Generar .deb
        run: |
          cargo deb
          cp target/debian/*.deb EasyPresenter-Linux.deb

      # ── AppImage ──────────────────────────────────────────────────────────
      - name: Descargar herramientas AppImage
        run: |
          curl -L "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" -o linuxdeploy
          curl -L "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -o appimagetool
          chmod +x linuxdeploy appimagetool

      - name: Preparar AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/easy-presenter-slint/data
          cp target/release/easy-presenter-slint AppDir/usr/bin/
          cp libpdfium.so AppDir/usr/lib/
          cp data/*.db AppDir/usr/share/easy-presenter-slint/data/

      - name: Crear .desktop
        run: |
          cat > AppDir/usr/share/applications/easy-presenter.desktop << 'EOF'
[Desktop Entry]
Name=EasyPresenter
Exec=easy-presenter-slint
Icon=easy-presenter
Type=Application
Categories=AudioVideo;Utility;
Comment=Presentacion multimedia, letras y Biblias
EOF

      - name: Preparar icono
        run: |
          DEST="AppDir/usr/share/icons/hicolor/256x256/apps/easy-presenter.png"
          if [ -f "assets/icon.png" ]; then
            cp assets/icon.png "$DEST"
          elif [ -f "assets/icon.ico" ]; then
            convert "assets/icon.ico[0]" -resize 256x256 "$DEST"
          else
            convert -size 256x256 xc:#1a1a3e \
              -fill white -font DejaVu-Sans-Bold -pointsize 80 \
              -gravity Center -annotate 0 "EP" "$DEST"
          fi

      - name: Desplegar dependencias con linuxdeploy
        run: |
          ./linuxdeploy --appimage-extract-and-run \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/easy-presenter.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/easy-presenter.png

      # Eliminar libs GStreamer/GLib del bundle para evitar mismatch de versiones.
      # El AppImage usa las del sistema del usuario (Ubuntu 20+, Debian 11+).
      - name: Limpiar libs GStreamer y GLib del AppDir
        run: |
          find AppDir/usr/lib \( \
            -name "libgst*.so*"     -o \
            -name "libglib*.so*"    -o \
            -name "libgobject*.so*" -o \
            -name "libgmodule*.so*" -o \
            -name "libgthread*.so*" -o \
            -name "libgio*.so*"     \
          \) -print -delete

      # printf evita el bug de indentacion YAML que corrompia el AppRun
      # y causaba la ruta duplicada usr/bin/usr/bin
      - name: Crear AppRun
        run: |
          printf '%s\n' \
            '#!/bin/bash' \
            'HERE="$(dirname "$(readlink -f "${0}")")"' \
            'export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"' \
            'unset GST_PLUGIN_PATH' \
            'unset GST_PLUGIN_SYSTEM_PATH_1_0' \
            'exec "${HERE}/usr/bin/easy-presenter-slint" "$@"' \
            > AppDir/AppRun
          chmod +x AppDir/AppRun
          echo "=== Verificacion AppRun ===" && cat AppDir/AppRun

      - name: Crear AppImage final
        run: |
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir EasyPresenter-Linux.AppImage

      # ── Artefactos y Release ──────────────────────────────────────────────
      - name: Subir .deb
        uses: actions/upload-artifact@v4
        with:
          name: EasyPresenter-Linux.deb
          path: EasyPresenter-Linux.deb

      - name: Subir AppImage
        uses: actions/upload-artifact@v4
        with:
          name: EasyPresenter-Linux.AppImage
          path: EasyPresenter-Linux.AppImage

      - name: Publicar en GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            EasyPresenter-Linux.deb
            EasyPresenter-Linux.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2: WINDOWS → instalador .exe con Inno Setup
  # ══════════════════════════════════════════════════════════════════════════
  build-windows:
    name: Windows (.exe installer)
    runs-on: windows-latest

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar Rust (stable)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Instalar GStreamer via Chocolatey
        shell: pwsh
        run: |
          choco install gstreamer-devel -y --no-progress
          $searchRoots = @("C:\Program Files\gstreamer", "C:\gstreamer", "C:\ProgramData\gstreamer")
          $gstBin = $null
          foreach ($root in $searchRoots) {
            $exe = Get-ChildItem $root -Recurse -Filter "gst-launch-1.0.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($exe) { $gstBin = $exe.DirectoryName; break }
          }
          if (-not $gstBin) {
            $exe = Get-ChildItem "C:\" -Recurse -Filter "gst-launch-1.0.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($exe) { $gstBin = $exe.DirectoryName }
          }
          if (-not $gstBin) { Write-Error "GStreamer no encontrado"; exit 1 }
          $GstPath = Split-Path $gstBin -Parent
          Write-Host "GStreamer en: $GstPath"
          echo "GSTREAMER_ROOT=$GstPath" >> $env:GITHUB_ENV

      - name: Configurar PKG_CONFIG para GStreamer
        shell: pwsh
        run: |
          $GstPath = $env:GSTREAMER_ROOT
          choco install pkgconfiglite -y --no-progress
          echo "PKG_CONFIG_PATH=$GstPath\lib\pkgconfig"  >> $env:GITHUB_ENV
          echo "GSTREAMER_1_0_ROOT_X86_64=$GstPath"      >> $env:GITHUB_ENV
          echo "$GstPath\bin"                             >> $env:GITHUB_PATH

      - name: Compilar (Release)
        run: cargo build --release

      - name: Copiar DLLs de GStreamer
        shell: pwsh
        run: |
          Copy-Item "$env:GSTREAMER_ROOT\bin\*.dll" -Destination "target\release\" -Force
          Remove-Item "target\release\*python*.dll" -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path "target\release\lib\gstreamer-1.0"
          Copy-Item "$env:GSTREAMER_ROOT\lib\gstreamer-1.0\*.dll" "target\release\lib\gstreamer-1.0\" -Force
          Remove-Item "target\release\lib\gstreamer-1.0\*python*.dll" -ErrorAction SilentlyContinue

      - name: Copiar pdfium.dll
        shell: pwsh
        run: Copy-Item "pdfium.dll" -Destination "target\release\" -Force

      - name: Generar instalador con Inno Setup
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Mover instalador al raiz
        shell: pwsh
        run: |
          $exe = Get-ChildItem "Output" -Filter "*.exe" | Select-Object -First 1
          if ($exe) {
            Move-Item $exe.FullName "EasyPresenter-Win10-11.exe"
          } else {
            Write-Error "No se encontro el .exe de Inno Setup"; exit 1
          }

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: EasyPresenter-Win10-11.exe
          path: EasyPresenter-Win10-11.exe

      - name: Publicar en GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: EasyPresenter-Win10-11.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}