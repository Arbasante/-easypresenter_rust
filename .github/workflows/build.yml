name: Compilar EasyPresenter Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Compilar para ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: Linux (Ubuntu)
            os: ubuntu-22.04
            rust_version: stable
            artifact_name: EasyPresenter-Linux.deb
            is_linux: true
            is_windows: false
            is_win7: false

          - target_name: Windows 10-11
            os: windows-latest
            rust_version: stable
            artifact_name: EasyPresenter-Win10-11.exe
            is_linux: false
            is_windows: true
            is_win7: false

          - target_name: Windows 7
            os: windows-latest
            rust_version: "1.77.2"
            artifact_name: EasyPresenter-Win7.exe
            is_linux: false
            is_windows: true
            is_win7: true

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Rust (${{ matrix.rust_version }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_version }}

      # ── LINUX ──────────────────────────────────────────────────────────────
      - name: Instalar Dependencias (Linux)
        if: matrix.is_linux
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libfontconfig1-dev \
            libasound2-dev libsqlite3-dev libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      # ── WINDOWS: INSTALAR GSTREAMER VÍA CHOCOLATEY ────────────────────────
      #
      # PROBLEMA ANTERIOR: gstreamer.freedesktop.org bloquea las IPs de
      # GitHub Actions → curl recibe timeout o una página HTML de error.
      #
      # SOLUCIÓN: Chocolatey está pre-instalado en TODOS los runners de GitHub
      # y descarga GStreamer desde sus propios mirrors CDN sin restricciones.
      # Instalamos runtime + devel en un solo paso.
      # ──────────────────────────────────────────────────────────────────────
      - name: Instalar GStreamer vía Chocolatey (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          Write-Host "Instalando GStreamer runtime..."
          choco install gstreamer --version=1.22.10 -y --no-progress

          Write-Host "Instalando GStreamer devel (headers + pkg-config)..."
          choco install gstreamer-devel --version=1.22.10 -y --no-progress

          # Chocolatey instala GStreamer en C:\gstreamer\1.0\msvc_x86_64
          # Verificar instalación
          if (Test-Path "C:\gstreamer\1.0\msvc_x86_64\bin") {
            Write-Host "✅ GStreamer instalado correctamente"
          } else {
            Write-Error "❌ GStreamer no se instaló en la ruta esperada"
            exit 1
          }

      - name: Preparar runtime MSI para Inno Setup (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          # Inno Setup necesita el runtime.msi para incluirlo en el instalador.
          # Como choco ya lo descargó, lo buscamos en su caché local.
          # Si no está en caché, lo descargamos desde el CDN de Choco (distinto
          # al de freedesktop.org, por eso funciona).
          $GstVersion = "1.22.10"
          $CachedMsi = Get-ChildItem "C:\ProgramData\chocolatey\lib\gstreamer\tools\*runtime*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1

          if ($CachedMsi) {
            Write-Host "Usando runtime MSI desde caché de Chocolatey: $($CachedMsi.FullName)"
            Copy-Item $CachedMsi.FullName "gstreamer-runtime.msi"
          } else {
            # Fallback: descarga desde el CDN alternativo de choco
            Write-Host "MSI no encontrado en caché, descargando desde CDN alternativo..."
            $MsiUrl = "https://packages.chocolatey.org/gstreamer.$GstVersion.nupkg"

            # Intentamos con Invoke-WebRequest (maneja mejor los redirects que curl en Windows)
            $ProgressPreference = 'SilentlyContinue'
            $attempt = 0
            $maxAttempts = 3
            $downloaded = $false

            while ($attempt -lt $maxAttempts -and -not $downloaded) {
              $attempt++
              try {
                Write-Host "Intento $attempt de $maxAttempts..."
                # Descargamos el MSI directamente del servidor de GStreamer con retry
                $RuntimeUrl = "https://gstreamer.freedesktop.org/data/pkg/windows/$GstVersion/msvc/gstreamer-1.0-msvc-x86_64-$GstVersion.msi"
                Invoke-WebRequest -Uri $RuntimeUrl -OutFile "gstreamer-runtime.msi" -UseBasicParsing -TimeoutSec 60
                $downloaded = $true
              } catch {
                Write-Warning "Intento $attempt falló: $_"
                if ($attempt -lt $maxAttempts) { Start-Sleep -Seconds 10 }
              }
            }

            if (-not $downloaded) {
              # Si no pudimos descargar el MSI, creamos un script de instalación
              # alternativo que usará el GStreamer ya instalado por choco
              Write-Host "⚠️ No se pudo obtener el MSI. Creando instalador alternativo..."
              # Marcamos para que Inno Setup use el método alternativo
              echo "USE_CHOCO_GSTREAMER=true" >> $env:GITHUB_ENV
            }
          }

          # Verificar que tenemos el archivo o la variable alternativa
          if (Test-Path "gstreamer-runtime.msi") {
            $size = (Get-Item "gstreamer-runtime.msi").Length
            Write-Host "✅ gstreamer-runtime.msi listo ($([math]::Round($size/1MB, 1)) MB)"
          }

      - name: Configurar Entorno GStreamer (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          $GstPath = "C:\gstreamer\1.0\msvc_x86_64"

          # pkgconfiglite: pkg-config independiente que no necesita DLLs externas
          choco install pkgconfiglite -y --no-progress

          echo "PKG_CONFIG_PATH=$GstPath\lib\pkgconfig"  >> $env:GITHUB_ENV
          echo "GSTREAMER_1_0_ROOT_X86_64=$GstPath"      >> $env:GITHUB_ENV
          echo "$GstPath\bin"                             >> $env:GITHUB_PATH

          # Verificar que pkg-config encuentra glib
          $env:PKG_CONFIG_PATH = "$GstPath\lib\pkgconfig"
          pkg-config --modversion glib-2.0

      # ── PREPARACIÓN WIN 7 ──────────────────────────────────────────────────
      - name: Adaptar Cargo.toml para Win 7 (versiones compatibles con Rust 1.77)
        if: matrix.is_win7
        shell: bash
        run: |
          # Fijar slint y slint-build a versión EXACTA (evita que Cargo suba a 1.15.x)
          sed -i 's/slint = "1\.8\.0"/slint = "=1.8.0"/'             Cargo.toml
          sed -i 's/slint-build = "1\.8\.0"/slint-build = "=1.8.0"/' Cargo.toml

          # image 0.25 → moxcms 0.7.11 usa edition2024, bajar a 0.24.9
          sed -i 's/image = "0\.25"/image = "=0.24.9"/' Cargo.toml

          rm -f Cargo.lock

          echo "--- Cambios aplicados ---"
          grep -E "slint|image" Cargo.toml

      # ── COMPILACIÓN ────────────────────────────────────────────────────────
      - name: Compilar Proyecto (Release)
        run: cargo build --release

      # ── EMPAQUETADO ────────────────────────────────────────────────────────
      - name: Generar .deb (Linux)
        if: matrix.is_linux
        run: |
          cargo install cargo-deb
          cargo deb
          cp target/debian/*.deb ${{ matrix.artifact_name }}

      - name: Generar Instalador Inno Setup (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Mover Instalador (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          if (Test-Path "Output/Instalar_EasyPresenter_v1.0.exe") {
            Move-Item "Output/Instalar_EasyPresenter_v1.0.exe" "${{ matrix.artifact_name }}"
          }

      # ── ARTEFACTOS ─────────────────────────────────────────────────────────
      - name: Subir Artefacto Terminado
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}