name: Compilar EasyPresenter Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1: LINUX → solo .deb
  # ══════════════════════════════════════════════════════════════════════════
  build-linux:
    name: Linux (.deb)
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar Rust (stable)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libfontconfig1-dev \
            libasound2-dev libsqlite3-dev libunwind-dev \
            libssl-dev pkg-config \
            libgtk-3-dev \
            libdbus-1-dev \
            libxrandr-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav

      - name: Preparar assets para el .deb
        run: |
          mkdir -p assets
          # Si no tienes icono propio, genera uno placeholder
          if [ ! -f assets/icon.png ]; then
            # Instalamos las fuentes dejavu para que ImageMagick tenga con qué escribir
            sudo apt-get install -y imagemagick fonts-dejavu-core
            
            # Forzamos el uso de DejaVu-Sans
            convert -size 256x256 "xc:#0ea5e9" -font DejaVu-Sans -fill white -pointsize 48 \
              -gravity center -annotate 0 "EP" assets/icon.png
          fi
      - name: Compilar (Release)
        run: cargo build --release

      - name: Copiar libpdfium.so al output
        run: cp libpdfium.so target/release/

      - name: Instalar cargo-deb
        run: cargo install cargo-deb

      - name: Generar .deb
        run: |
          cargo deb --deb-version "${{ github.ref_name }}"
          cp target/debian/*.deb EasyPresenter-Linux.deb

      - name: Subir .deb como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: EasyPresenter-Linux.deb
          path: EasyPresenter-Linux.deb

      - name: Publicar en GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: EasyPresenter-Linux.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2: WINDOWS → instalador .exe con Inno Setup
  # ══════════════════════════════════════════════════════════════════════════
  build-windows:
    name: Windows (.exe installer)
    runs-on: windows-latest

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar Rust (stable)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Instalar GStreamer (Directo sin Chocolatey)
        shell: pwsh
        run: |
          # Usamos una versión estable y conocida de GStreamer
          $Version = "1.24.2" 
          $UrlGst = "https://gstreamer.freedesktop.org/data/pkg/windows/$Version/msvc/gstreamer-1.0-msvc-x86_64-$Version.msi"
          $UrlDev = "https://gstreamer.freedesktop.org/data/pkg/windows/$Version/msvc/gstreamer-1.0-devel-msvc-x86_64-$Version.msi"

          Write-Host "Descargando GStreamer $Version engañando al firewall..."
          # El User-Agent falso es la clave para evitar el error 418
          Invoke-WebRequest -Uri $UrlGst -OutFile "gst.msi" -UserAgent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          Invoke-WebRequest -Uri $UrlDev -OutFile "gst-dev.msi" -UserAgent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

          Write-Host "Instalando paquetes MSI en silencio..."
          Start-Process -Wait -FilePath msiexec -ArgumentList "/i gst.msi /quiet /norestart"
          Start-Process -Wait -FilePath msiexec -ArgumentList "/i gst-dev.msi /quiet /norestart"

          # La ruta oficial donde se instalan los MSI de GStreamer
          $GstPath = "C:\gstreamer\1.0\msvc_x86_64"
          Write-Host "GStreamer instalado en: $GstPath"
          
          # Guardamos la variable de entorno para los siguientes pasos
          echo "GSTREAMER_ROOT=$GstPath" >> $env:GITHUB_ENV

      - name: Configurar PKG_CONFIG para GStreamer
        shell: pwsh
        run: |
          $GstPath = $env:GSTREAMER_ROOT
          choco install pkgconfiglite -y --no-progress
          echo "PKG_CONFIG_PATH=$GstPath\lib\pkgconfig"  >> $env:GITHUB_ENV
          echo "GSTREAMER_1_0_ROOT_X86_64=$GstPath"      >> $env:GITHUB_ENV
          echo "$GstPath\bin"                             >> $env:GITHUB_PATH

      - name: Compilar (Release)
        run: cargo build --release

      - name: Copiar DLLs de GStreamer
        shell: pwsh
        run: |
          Copy-Item "$env:GSTREAMER_ROOT\bin\*.dll" -Destination "target\release\" -Force
          Remove-Item "target\release\*python*.dll" -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path "target\release\lib\gstreamer-1.0"
          Copy-Item "$env:GSTREAMER_ROOT\lib\gstreamer-1.0\*.dll" "target\release\lib\gstreamer-1.0\" -Force
          Remove-Item "target\release\lib\gstreamer-1.0\*python*.dll" -ErrorAction SilentlyContinue

      - name: Copiar pdfium.dll
        shell: pwsh
        run: Copy-Item "pdfium.dll" -Destination "target\release\" -Force

      - name: Generar instalador con Inno Setup
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Mover instalador al raiz
        shell: pwsh
        run: |
          $exe = Get-ChildItem "Output" -Filter "*.exe" | Select-Object -First 1
          if ($exe) {
            Move-Item $exe.FullName "EasyPresenter-Win10-11.exe"
          } else {
            Write-Error "No se encontro el .exe de Inno Setup"; exit 1
          }

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: EasyPresenter-Win10-11.exe
          path: EasyPresenter-Win10-11.exe

      - name: Publicar en GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: EasyPresenter-Win10-11.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}