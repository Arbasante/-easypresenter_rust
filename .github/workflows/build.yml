name: Compilar EasyPresenter Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Compilar para ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: Linux (Ubuntu)
            os: ubuntu-22.04
            rust_version: stable
            artifact_name: EasyPresenter-Linux.deb
            is_linux: true
            is_windows: false
            is_win7: false

          - target_name: Windows 10-11
            os: windows-latest
            rust_version: stable
            artifact_name: EasyPresenter-Win10-11.exe
            is_linux: false
            is_windows: true
            is_win7: false

          - target_name: Windows 7
            os: windows-latest
            rust_version: "1.77.2"
            artifact_name: EasyPresenter-Win7.exe
            is_linux: false
            is_windows: true
            is_win7: true

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Rust (${{ matrix.rust_version }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_version }}

      # ── LINUX ──────────────────────────────────────────────────────────────
      - name: Instalar Dependencias (Linux)
        if: matrix.is_linux
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libfontconfig1-dev \
            libasound2-dev libsqlite3-dev libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      # ── WINDOWS: INSTALAR GSTREAMER ────────────────────────────────────────
      - name: Instalar GStreamer vía Chocolatey (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          # gstreamer-devel instala el runtime como dependencia automáticamente.
          # Sin pin de versión → choco usa la última disponible (1.26.x actualmente).
          # freedesktop.org bloquea GitHub Actions, pero los paquetes de choco
          # tienen su propio CDN que sí funciona desde los runners.
          choco install gstreamer-devel -y --no-progress

          # ── Detectar la ruta real de instalación ──────────────────────────
          # Choco puede instalar en distintas rutas según la versión del paquete.
          # Buscamos gst-launch-1.0.exe para encontrar dónde quedó.
          $searchRoots = @("C:\Program Files\gstreamer", "C:\gstreamer", "C:\ProgramData\gstreamer")
          $gstBin = $null

          foreach ($root in $searchRoots) {
            $exe = Get-ChildItem $root -Recurse -Filter "gst-launch-1.0.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($exe) { $gstBin = $exe.DirectoryName; break }
          }

          # Fallback: buscar en todo C:\ (más lento pero seguro)
          if (-not $gstBin) {
            $exe = Get-ChildItem "C:\" -Recurse -Filter "gst-launch-1.0.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($exe) { $gstBin = $exe.DirectoryName }
          }

          if (-not $gstBin) {
            Write-Error "❌ No se encontró gst-launch-1.0.exe tras la instalación"
            exit 1
          }

          $GstPath = Split-Path $gstBin -Parent   # sube un nivel desde \bin
          Write-Host "✅ GStreamer en: $GstPath"
          echo "GSTREAMER_ROOT=$GstPath" >> $env:GITHUB_ENV

      - name: Configurar entorno de compilación GStreamer (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          $GstPath = $env:GSTREAMER_ROOT

          # pkgconfiglite: binario estático que no necesita DLLs de GStreamer
          choco install pkgconfiglite -y --no-progress

          echo "PKG_CONFIG_PATH=$GstPath\lib\pkgconfig"  >> $env:GITHUB_ENV
          echo "GSTREAMER_1_0_ROOT_X86_64=$GstPath"      >> $env:GITHUB_ENV
          echo "$GstPath\bin"                             >> $env:GITHUB_PATH

          # Verificar que pkg-config puede leer los archivos .pc de GStreamer
          $env:PKG_CONFIG_PATH = "$GstPath\lib\pkgconfig"
          $ver = pkg-config --modversion glib-2.0
          Write-Host "✅ pkg-config OK → glib-2.0 = $ver"

      - name: Obtener MSI del runtime para Inno Setup (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          # ── Obtener la versión instalada de gst-launch.exe ────────────────
          # "gst-launch-1.0 version 1.26.9" → extraemos "1.26.9"
          $gstBin   = "$env:GSTREAMER_ROOT\bin\gst-launch-1.0.exe"
          $verLine  = & $gstBin --version 2>&1 | Select-String "version \d+\.\d+\.\d+"
          $gstVer   = ($verLine.Matches[0].Value -split " ")[1]
          Write-Host "Versión detectada de GStreamer: $gstVer"

          # ── Buscar el MSI que choco ya descargó en las carpetas temporales ─
          # Choco descarga el MSI a %TEMP%\chocolatey\<pkg>\<ver>\ antes de
          # ejecutarlo. A veces queda ahí, a veces lo borra. Buscamos primero.
          $msiName  = "gstreamer-1.0-msvc-x86_64-$gstVer.msi"
          $searchDirs = @(
            "$env:TEMP\chocolatey",
            "$env:LOCALAPPDATA\Temp\chocolatey",
            "C:\ProgramData\chocolatey\lib\gstreamer\tools",
            "C:\ProgramData\chocolatey\lib\gstreamer"
          )

          $foundMsi = $null
          foreach ($dir in $searchDirs) {
            $candidate = Get-ChildItem $dir -Recurse -Filter $msiName -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($candidate) { $foundMsi = $candidate.FullName; break }
          }

          if ($foundMsi) {
            Write-Host "✅ MSI encontrado en caché: $foundMsi"
            Copy-Item $foundMsi "gstreamer-runtime.msi"
          } else {
            # ── Fallback: GitHub Releases de GStreamer ────────────────────
            # GStreamer publica sus binarios también en GitHub Releases,
            # que NO está bloqueado para GitHub Actions.
            Write-Host "MSI no encontrado en caché. Intentando GitHub Releases..."
            $ghUrl = "https://github.com/GStreamer/gstreamer/releases/download/$gstVer/$msiName"
            Write-Host "URL: $ghUrl"
            $ProgressPreference = 'SilentlyContinue'
            try {
              Invoke-WebRequest -Uri $ghUrl -OutFile "gstreamer-runtime.msi" -UseBasicParsing -TimeoutSec 120
              Write-Host "✅ MSI descargado desde GitHub Releases"
            } catch {
              # ── Último recurso: crear un instalador sin MSI ───────────────
              # Si no podemos obtener el MSI, generamos un instalador funcional
              # que avisa al usuario que debe instalar GStreamer manualmente.
              Write-Warning "No se pudo obtener el MSI. El instalador mostrará instrucciones manuales."
              echo "SKIP_GSTREAMER_MSI=true" >> $env:GITHUB_ENV
            }
          }

          # Verificar tamaño (un MSI real pesa > 50 MB)
          if (Test-Path "gstreamer-runtime.msi") {
            $sizeMB = [math]::Round((Get-Item "gstreamer-runtime.msi").Length / 1MB, 1)
            Write-Host "Tamaño del MSI: $sizeMB MB"
            if ($sizeMB -lt 10) {
              Write-Warning "⚠️ El MSI parece demasiado pequeño ($sizeMB MB). Puede estar corrupto."
              echo "SKIP_GSTREAMER_MSI=true" >> $env:GITHUB_ENV
            }
          }

      # ── PREPARACIÓN WIN 7 ──────────────────────────────────────────────────
      - name: Adaptar Cargo.toml para Win 7 (versiones compatibles con Rust 1.77)
        if: matrix.is_win7
        shell: bash
        run: |
          sed -i 's/slint = "1\.8\.0"/slint = "=1.8.0"/'             Cargo.toml
          sed -i 's/slint-build = "1\.8\.0"/slint-build = "=1.8.0"/' Cargo.toml
          sed -i 's/image = "0\.25"/image = "=0.24.9"/'               Cargo.toml
          rm -f Cargo.lock

          echo "--- Cambios aplicados en Cargo.toml ---"
          grep -E "slint|image" Cargo.toml

      # ── COMPILACIÓN ────────────────────────────────────────────────────────
      - name: Compilar Proyecto (Release)
        run: cargo build --release

      # ── EMPAQUETADO ────────────────────────────────────────────────────────
      - name: Generar .deb (Linux)
        if: matrix.is_linux
        run: |
          cargo install cargo-deb
          cargo deb
          cp target/debian/*.deb ${{ matrix.artifact_name }}

      - name: Generar Instalador Inno Setup (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          # Si no conseguimos el MSI, usamos un .iss alternativo sin él
          if ($env:SKIP_GSTREAMER_MSI -eq "true") {
            Write-Warning "Compilando instalador SIN bundlear GStreamer MSI."
            # Crear un installer.iss temporal sin la sección de GStreamer
            (Get-Content installer.iss) `
              -replace 'Source: "gstreamer-runtime\.msi".*', '' `
              -replace 'Filename: "msiexec\.exe".*GStreamer.*', '' |
              Set-Content installer_nogst.iss
            & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_nogst.iss
          } else {
            & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          }

      - name: Mover Instalador (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          if (Test-Path "Output/Instalar_EasyPresenter_v1.0.exe") {
            Move-Item "Output/Instalar_EasyPresenter_v1.0.exe" "${{ matrix.artifact_name }}"
          }

      # ── ARTEFACTOS ─────────────────────────────────────────────────────────
      - name: Subir Artefacto Terminado
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}