name: Compilar EasyPresenter Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Compilar para ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: Linux (Ubuntu)
            os: ubuntu-22.04
            rust_version: stable
            artifact_name: EasyPresenter-Linux.deb
            is_linux: true
            is_windows: false
            is_win7: false

          - target_name: Windows 10-11
            os: windows-latest
            rust_version: stable
            artifact_name: EasyPresenter-Win10-11.exe
            is_linux: false
            is_windows: true
            is_win7: false

          - target_name: Windows 7
            os: windows-latest
            rust_version: "1.77.2"
            artifact_name: EasyPresenter-Win7.exe
            is_linux: false
            is_windows: true
            is_win7: true

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Rust (${{ matrix.rust_version }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_version }}

      # ── LINUX ──────────────────────────────────────────────────────────────
      - name: Instalar Dependencias (Linux)
        if: matrix.is_linux
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libfontconfig1-dev \
            libasound2-dev libsqlite3-dev libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      # ── WINDOWS ────────────────────────────────────────────────────────────
      - name: Descargar e Instalar GStreamer (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          $Version = "1.22.10"
          $RuntimeUrl = "https://gstreamer.freedesktop.org/data/pkg/windows/${Version}/msvc/gstreamer-1.0-msvc-x86_64-${Version}.msi"
          $DevelUrl   = "https://gstreamer.freedesktop.org/data/pkg/windows/${Version}/msvc/gstreamer-1.0-devel-msvc-x86_64-${Version}.msi"

          Write-Host "Descargando GStreamer $Version..."
          curl.exe -L -A "Mozilla/5.0" -o runtime.msi $RuntimeUrl
          curl.exe -L -A "Mozilla/5.0" -o devel.msi   $DevelUrl

          Write-Host "Instalando Runtime..."
          Start-Process msiexec.exe -Wait -ArgumentList '/i runtime.msi /quiet /norestart'

          Write-Host "Instalando Devel..."
          Start-Process msiexec.exe -Wait -ArgumentList '/i devel.msi /quiet /norestart'

          Copy-Item runtime.msi "gstreamer-runtime.msi"

          # Verificar que el directorio de GStreamer existe
          if (Test-Path "C:\gstreamer\1.0\msvc_x86_64\bin") {
            Write-Host "✅ GStreamer instalado correctamente"
            Get-ChildItem "C:\gstreamer\1.0\msvc_x86_64\bin\pkg-config*"
          } else {
            Write-Error "❌ GStreamer no se instaló en la ruta esperada"
          }

      - name: Instalar pkg-config independiente (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          # FIX DEFINITIVO para pkg-config en Windows CI:
          #
          # El pkg-config.exe que viene con GStreamer necesita cargar sus propias
          # DLLs para ejecutarse. Aunque lo añadamos al PATH, hay condiciones de
          # carrera y dependencias de MSVC runtime que hacen que falle.
          #
          # La solución es instalar pkgconfiglite (un pkg-config independiente y
          # estático) que NO necesita ninguna DLL externa para funcionar.
          # Luego lo configuramos para que lea los archivos .pc de GStreamer.

          choco install pkgconfiglite -y --no-progress

          # Verificar que funciona
          pkg-config --version

      - name: Configurar Entorno GStreamer (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          $GstPath = "C:\gstreamer\1.0\msvc_x86_64"

          # pkg-config independiente de choco + apuntar sus búsquedas a GStreamer
          echo "PKG_CONFIG_PATH=$GstPath\lib\pkgconfig"  >> $env:GITHUB_ENV
          echo "GSTREAMER_1_0_ROOT_X86_64=$GstPath"      >> $env:GITHUB_ENV

          # El bin de GStreamer en PATH para que los .dll sean localizables en runtime
          echo "$GstPath\bin" >> $env:GITHUB_PATH

          # Verificar archivos .pc disponibles
          Write-Host "Archivos .pc en GStreamer:"
          Get-ChildItem "$GstPath\lib\pkgconfig\glib*" | Select-Object Name

      # ── PREPARACIÓN WIN 7 ──────────────────────────────────────────────────
      #
      # Problema 1: slint/slint-build "1.8.0" = ^1.8.0 → Cargo resuelve a 1.15.x
      #   Fix: reemplazar por "=1.8.0" (versión exacta) en Cargo.toml
      #
      # Problema 2: image = "0.25" → su dep moxcms 0.7.11 usa edition2024
      #   Fix: bajar image a "=0.24.9" que no tiene esa dependencia
      #
      # ──────────────────────────────────────────────────────────────────────
      - name: Adaptar Cargo.toml para Win 7 (versiones compatibles con Rust 1.77)
        if: matrix.is_win7
        shell: bash
        run: |
          # ── Fijar slint y slint-build a versión EXACTA ──────────────────
          sed -i 's/slint = "1\.8\.0"/slint = "=1.8.0"/'             Cargo.toml
          sed -i 's/slint-build = "1\.8\.0"/slint-build = "=1.8.0"/' Cargo.toml

          # ── Bajar image a 0.24.9 (moxcms no existe en esa versión) ──────
          # image 0.25 introdujo moxcms como dependencia (edition2024).
          # image 0.24.9 es la última versión de la rama 0.24 y es compatible
          # con Rust 1.70+ sin requerir edition2024 en ninguna dependencia.
          sed -i 's/image = "0\.25"/image = "=0.24.9"/' Cargo.toml

          # Eliminar Cargo.lock para que Cargo resuelva desde cero
          rm -f Cargo.lock

          # Verificar cambios
          echo "--- Líneas modificadas en Cargo.toml ---"
          grep -E "slint|image" Cargo.toml

      # ── COMPILACIÓN ────────────────────────────────────────────────────────
      - name: Compilar Proyecto (Release)
        run: cargo build --release

      # ── EMPAQUETADO ────────────────────────────────────────────────────────
      - name: Generar .deb (Linux)
        if: matrix.is_linux
        run: |
          cargo install cargo-deb
          cargo deb
          cp target/debian/*.deb ${{ matrix.artifact_name }}

      - name: Generar Instalador Inno Setup (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Mover Instalador (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          if (Test-Path "Output/Instalar_EasyPresenter_v1.0.exe") {
            Move-Item "Output/Instalar_EasyPresenter_v1.0.exe" "${{ matrix.artifact_name }}"
          }

      # ── ARTEFACTOS ─────────────────────────────────────────────────────────
      - name: Subir Artefacto Terminado
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}