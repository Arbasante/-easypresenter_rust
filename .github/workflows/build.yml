name: Compilar EasyPresenter Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Compilar para ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: Linux (Ubuntu)
            os: ubuntu-22.04
            rust_version: stable
            artifact_name: EasyPresenter-Linux.deb
            is_linux: true
            is_windows: false
            is_win7: false

          - target_name: Windows 10-11
            os: windows-latest
            rust_version: stable
            artifact_name: EasyPresenter-Win10-11.exe
            is_linux: false
            is_windows: true
            is_win7: false

          - target_name: Windows 7
            os: windows-latest
            rust_version: "1.77.2"
            artifact_name: EasyPresenter-Win7.exe
            is_linux: false
            is_windows: true
            is_win7: true

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Rust (${{ matrix.rust_version }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_version }}

      # ── LINUX ──────────────────────────────────────────────────────────────
      - name: Instalar Dependencias (Linux)
        if: matrix.is_linux
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxkbcommon-dev libfontconfig1-dev \
            libasound2-dev libsqlite3-dev libunwind-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      # ── WINDOWS: INSTALAR GSTREAMER (TU CÓDIGO ORIGINAL) ───────────────────
      - name: Instalar GStreamer vía Chocolatey (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          choco install gstreamer-devel -y --no-progress

          $searchRoots = @("C:\Program Files\gstreamer", "C:\gstreamer", "C:\ProgramData\gstreamer")
          $gstBin = $null
          foreach ($root in $searchRoots) {
            $exe = Get-ChildItem $root -Recurse -Filter "gst-launch-1.0.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($exe) { $gstBin = $exe.DirectoryName; break }
          }
          if (-not $gstBin) {
            $exe = Get-ChildItem "C:\" -Recurse -Filter "gst-launch-1.0.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($exe) { $gstBin = $exe.DirectoryName }
          }
          if (-not $gstBin) { Write-Error "❌ GStreamer no encontrado"; exit 1 }

          $GstPath = Split-Path $gstBin -Parent
          Write-Host "✅ GStreamer en: $GstPath"
          echo "GSTREAMER_ROOT=$GstPath" >> $env:GITHUB_ENV

      - name: Configurar entorno de compilación GStreamer (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          $GstPath = $env:GSTREAMER_ROOT
          choco install pkgconfiglite -y --no-progress

          echo "PKG_CONFIG_PATH=$GstPath\lib\pkgconfig"  >> $env:GITHUB_ENV
          echo "GSTREAMER_1_0_ROOT_X86_64=$GstPath"      >> $env:GITHUB_ENV
          echo "$GstPath\bin"                             >> $env:GITHUB_PATH

          $env:PKG_CONFIG_PATH = "$GstPath\lib\pkgconfig"
          $ver = pkg-config --modversion glib-2.0
          Write-Host "✅ pkg-config OK → glib-2.0 = $ver"

      - name: Obtener MSI del runtime para Inno Setup (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          $gstBin  = "$env:GSTREAMER_ROOT\bin\gst-launch-1.0.exe"
          $verLine = & $gstBin --version 2>&1 | Select-String "version \d+\.\d+\.\d+"
          $gstVer  = ($verLine.Matches[0].Value -split " ")[1]
          Write-Host "Versión GStreamer: $gstVer"

          $msiName = "gstreamer-1.0-msvc-x86_64-$gstVer.msi"
          $searchDirs = @(
            "$env:TEMP\chocolatey",
            "$env:LOCALAPPDATA\Temp\chocolatey",
            "C:\ProgramData\chocolatey\lib\gstreamer\tools",
            "C:\ProgramData\chocolatey\lib\gstreamer"
          )

          $foundMsi = $null
          foreach ($dir in $searchDirs) {
            $c = Get-ChildItem $dir -Recurse -Filter $msiName -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($c) { $foundMsi = $c.FullName; break }
          }

          if ($foundMsi) {
            Write-Host "✅ MSI en caché: $foundMsi"
            Copy-Item $foundMsi "gstreamer-runtime.msi"
          } else {
            Write-Host "Intentando GitHub Releases..."
            $ghUrl = "https://github.com/GStreamer/gstreamer/releases/download/$gstVer/$msiName"
            $ProgressPreference = 'SilentlyContinue'
            try {
              Invoke-WebRequest -Uri $ghUrl -OutFile "gstreamer-runtime.msi" -UseBasicParsing -TimeoutSec 120
              Write-Host "✅ MSI descargado desde GitHub Releases"
            } catch {
              Write-Warning "No se pudo obtener el MSI. El instalador se generará sin él."
              echo "SKIP_GSTREAMER_MSI=true" >> $env:GITHUB_ENV
            }
          }

          if (Test-Path "gstreamer-runtime.msi") {
            $sizeMB = [math]::Round((Get-Item "gstreamer-runtime.msi").Length / 1MB, 1)
            Write-Host "Tamaño MSI: $sizeMB MB"
            if ($sizeMB -lt 10) {
              Write-Warning "⚠️ MSI demasiado pequeño, puede estar corrupto"
              echo "SKIP_GSTREAMER_MSI=true" >> $env:GITHUB_ENV
            }
          }

      # ── PREPARACIÓN WIN 7 (ÚNICO CAMBIO: ESTRATEGIA LOCKFILE) ──────────────
      - name: Generar Cargo.lock compatible para Win 7
        if: matrix.is_win7
        shell: bash
        run: |
          # 1. Instalar Rust estable temporalmente solo para esta tarea
          rustup toolchain install stable

          # 2. Generar el lockfile con stable (que no crashea leyendo catálogos de 2024)
          rm -f Cargo.lock
          cargo +stable generate-lockfile

          # 3. Forzar el downgrade de TODAS las librerías "topo" directo al lockfile
          cargo +stable update -p pxfm --precise 0.1.27
          cargo +stable update -p moxcms --precise 0.7.9
          cargo +stable update -p home --precise 0.5.11

          # 4. Truco de magia: Convertir el Lockfile v4 a formato antiguo (v3)
          sed -i 's/version = 4/version = 3/g' Cargo.lock

          echo "✅ Lockfile parcheado, domado y listo para Rust 1.77.2"

      # ── COMPILACIÓN ────────────────────────────────────────────────────────
      - name: Compilar Proyecto (Release)
        run: cargo build --release

      # ── EMPAQUETADO ────────────────────────────────────────────────────────
      - name: Generar .deb (Linux)
        if: matrix.is_linux
        run: |
          cargo install cargo-deb
          cargo deb
          cp target/debian/*.deb ${{ matrix.artifact_name }}

      - name: Generar Instalador Inno Setup (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          if ($env:SKIP_GSTREAMER_MSI -eq "true") {
            Write-Warning "Compilando instalador SIN GStreamer MSI."
            (Get-Content installer.iss) `
              -replace 'Source: "gstreamer-runtime\.msi".*', '' `
              -replace 'Filename: "msiexec\.exe".*GStreamer.*', '' |
              Set-Content installer_nogst.iss
            & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer_nogst.iss
          } else {
            & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
          }

      - name: Mover Instalador (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          if (Test-Path "Output/Instalar_EasyPresenter_v1.0.exe") {
            Move-Item "Output/Instalar_EasyPresenter_v1.0.exe" "${{ matrix.artifact_name }}"
          }

      # ── ARTEFACTOS ─────────────────────────────────────────────────────────
      - name: Subir Artefacto Terminado
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}