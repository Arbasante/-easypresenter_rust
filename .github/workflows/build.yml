name: Compilar EasyPresenter Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Compilar para ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: Linux (Ubuntu)
            os: ubuntu-latest
            rust_version: stable
            artifact_name: EasyPresenter-Linux.deb
            is_linux: true
            is_windows: false

          - target_name: Windows 10-11
            os: windows-latest
            rust_version: stable
            artifact_name: EasyPresenter-Win10-11.exe
            is_linux: false
            is_windows: true

          - target_name: Windows 7
            os: windows-latest
            rust_version: 1.77.2
            artifact_name: EasyPresenter-Win7.exe
            is_linux: false
            is_windows: true

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Rust (${{ matrix.rust_version }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_version }}

      # --- BLOQUE LINUX ---
      - name: Instalar Dependencias (Linux)
        if: matrix.is_linux
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxkbcommon-dev libfontconfig1-dev libasound2-dev libsqlite3-dev libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      # --- BLOQUE WINDOWS ---
      - name: Instalar GStreamer y PkgConf (Windows)
        if: matrix.is_windows
        run: |
          # 🟢 FIX: Usamos pkgconf (moderno) en lugar de pkgconfiglite (obsoleto)
          choco install pkgconf -y
          choco install gstreamer gstreamer-devel -y

      - name: Configurar Variables de Entorno (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          # 🟢 FIX: Le decimos a Rust que use explícitamente el nuevo pkgconf
          echo "PKG_CONFIG=pkgconf" >> $env:GITHUB_ENV
          echo "GSTREAMER_1_0_ROOT_X86_64=C:\gstreamer\1.0\msvc_x86_64\" >> $env:GITHUB_ENV
          echo "PKG_CONFIG_PATH=C:\gstreamer\1.0\msvc_x86_64\lib\pkgconfig" >> $env:GITHUB_ENV
          echo "PATH=C:\gstreamer\1.0\msvc_x86_64\bin;C:\gstreamer\1.0\msvc_x86_64\lib;$env:PATH" >> $env:GITHUB_ENV

      - name: Descargar MSI de GStreamer (Saltando el Bloqueo)
        if: matrix.is_windows
        shell: pwsh
        run: |
          curl.exe -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" `
          -o "gstreamer-runtime.msi" `
          "https://gstreamer.freedesktop.org/data/pkg/windows/1.22.10/msvc/gstreamer-1.0-msvc-x86_64-1.22.10.msi"

      # --- 🟢 FIX DEL CARGO.LOCK PARA WINDOWS 7 ---
      - name: Borrar Cargo.lock incompatible (Solo Win 7)
        if: matrix.target_name == 'Windows 7'
        shell: pwsh
        run: |
          if (Test-Path "Cargo.lock") { Remove-Item "Cargo.lock" }

      # --- COMPILACIÓN RUST ---
      - name: Compilar Proyecto (Release)
        run: cargo build --release

      # --- CREACIÓN DE INSTALADORES ---
      - name: Generar .deb (Linux)
        if: matrix.is_linux
        run: |
          cargo install cargo-deb
          cargo deb
          cp target/debian/*.deb ${{ matrix.artifact_name }}

      - name: Generar Instalador .exe (Windows)
        if: matrix.is_windows
        uses: joncloud/makensis-action@v4
        with:
          script-file: "installer.iss"

      - name: Mover y Renombrar Instalador (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          if (Test-Path "Output/Instalar_EasyPresenter_v1.0.exe") {
            Move-Item "Output/Instalar_EasyPresenter_v1.0.exe" "${{ matrix.artifact_name }}"
          }

      # --- SUBIDA DE RESULTADOS ---
      - name: Subir Artefacto Terminado
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}