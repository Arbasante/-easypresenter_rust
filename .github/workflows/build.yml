name: Compilar EasyPresenter Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Compilar en ${{ matrix.os_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_name: Linux (Ubuntu)
            os: ubuntu-22.04
            rust_version: 1.15.1 # Usamos la misma de Slint
            artifact_name: EasyPresenter-Linux.deb
            is_linux: true
            is_windows: false

          - os_name: Windows 10/11
            os: windows-latest
            rust_version: stable
            artifact_name: EasyPresenter-Win10-11.exe # Ahora será el instalador
            is_linux: false
            is_windows: true

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust_version }}

      # SOLUCIÓN AL ERROR DE DEPENDENCIAS EN LINUX
      - name: Instalar Dependencias (Linux)
        if: matrix.is_linux
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-broken
          sudo apt-get install -y libx11-dev libxkbcommon-dev libfontconfig1-dev libasound2-dev libsqlite3-dev libunwind-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Instalar Dependencias (Windows)
        if: matrix.is_windows
        run: |
          choco install pkgconfiglite
          choco install gstreamer gstreamer-devel

      - name: Compilar Proyecto (Release)
        run: cargo build --release

      # EMPAQUETADO LINUX
      - name: Empaquetar .deb (Linux)
        if: matrix.is_linux
        run: |
          cargo install cargo-deb
          cargo deb
          cp target/debian/*.deb ${{ matrix.artifact_name }}

      # EMPAQUETADO WINDOWS CON INNO SETUP
      - name: Compilar Instalador Inno Setup
        if: matrix.is_windows
        uses: joncloud/makensis-action@v4
        with:
          script-file: "installer.iss" # Asegúrate de que el archivo se llame así en tu repo

      - name: Renombrar Instalador (Windows)
        if: matrix.is_windows
        run: mv Output/Instalar_EasyPresenter_v1.0.exe ${{ matrix.artifact_name }}

      - name: Subir Artefacto Terminado
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}